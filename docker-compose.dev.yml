version: '3.8'

services:
  # ── Frontend Development Service ──────────────────────────────
  frontend-dev:
    build:
      context: .
      dockerfile: resume-insights/Dockerfile.dev
    container_name: resume-analyzer-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./resume-insights/src:/app/src
      - ./resume-insights/index.html:/app/index.html
      - ./resume-insights/tailwind.config.js:/app/tailwind.config.js
      - ./resume-insights/postcss.config.js:/app/postcss.config.js
    environment:
      - VITE_API_URL=http://localhost:4000
      - VITE_API_KEY=test-api-key
    networks:
      - resume-analyzer-network
    restart: unless-stopped
    command: npm run dev

  # ── Backend Development Service ───────────────────────────────
  backend-dev:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: resume-analyzer-backend-dev
    ports:
      - "4000:3001"
    volumes:
      - ./backend/lambdas:/var/task/lambdas
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT_URL=http://localstack:4566
      - BUCKET_NAME=resume-analyzer-bucket
      - TABLE_NAME=resume-analyzer-analysis
      - USERS_TABLE_NAME=resume-analyzer-users
      - GROQ_SECRET_NAME=resume-analyzer/groq-api-key
      - JWT_SECRET=resume-analyzer-jwt-secret-key-change-in-prod
    depends_on:
      - localstack
      - dynamodb
    networks:
      - resume-analyzer-network
    restart: unless-stopped

  # ── LocalStack (AWS Emulation) ────────────────────────────────
  localstack:
    image: localstack/localstack:latest
    container_name: resume-analyzer-localstack-dev
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,dynamodb,secretsmanager,apigateway,lambda
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - "${TMPDIR}:/tmp/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - resume-analyzer-network
    restart: unless-stopped

  # ── DynamoDB Local ───────────────────────────────────────────
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: resume-analyzer-dynamodb-dev
    ports:
      - "8000:8000"
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    networks:
      - resume-analyzer-network
    restart: unless-stopped
    command: -jar DynamoDBLocal.jar -sharedDb

networks:
  resume-analyzer-network:
    driver: bridge
